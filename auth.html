<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity AI — Sign in</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #0a0a0a; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; }
        input:-webkit-autofill { -webkit-box-shadow: 0 0 0 30px #131313 inset !important; -webkit-text-fill-color: #fff !important; }
        .tab-active   { background: rgba(124,58,237,0.15); color: #c4b5fd; border-color: rgba(124,58,237,0.3); }
        .tab-inactive { color: #6b7280; border-color: transparent; }
        .auth-glow { position:fixed; width:600px; height:600px; background:radial-gradient(circle,rgba(124,58,237,0.08) 0%,transparent 70%); top:-200px; left:50%; transform:translateX(-50%); pointer-events:none; }
        .auth-input { width:100%; background:#131313; border:1px solid rgba(255,255,255,0.07); border-radius:0.75rem; padding:0.75rem 1rem; color:white; font-size:0.875rem; outline:none; transition:border-color 0.2s, box-shadow 0.2s; }
        .auth-input:focus { border-color:rgba(124,58,237,0.5); box-shadow:0 0 0 3px rgba(124,58,237,0.08); }
        .auth-input::placeholder { color:#374151; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 text-white">

    <div class="auth-glow"></div>

    <div class="w-full max-w-sm relative z-10">

        <!-- Logo -->
        <a href="/" class="flex items-center justify-center gap-2.5 mb-2 group">
            <div class="w-11 h-11 rounded-2xl bg-gradient-to-br from-violet-600 to-indigo-700 flex items-center justify-center shadow-xl shadow-violet-900/40">
                <i data-lucide="gem" class="text-white w-5"></i>
            </div>
        </a>
        <h2 class="text-center text-xl font-bold text-white mb-1">Welcome to Clarity AI</h2>
        <p class="text-center text-gray-500 text-sm mb-7">Sign in to your account to continue</p>

        <!-- Alert -->
        <div id="alert" class="hidden mb-4 p-3 rounded-xl text-sm border"></div>

        <!-- Tab switcher -->
        <div class="flex bg-white/[0.03] rounded-xl p-1 mb-5 border border-white/5">
            <button id="tab-login"  onclick="showLogin()"  class="flex-1 py-2.5 text-sm font-medium rounded-lg transition-all border tab-active">Log In</button>
            <button id="tab-signup" onclick="showSignup()" class="flex-1 py-2.5 text-sm font-medium rounded-lg transition-all border tab-inactive">Sign Up</button>
        </div>

        <!-- Login Form -->
        <div id="login-form">
            <div class="space-y-3">
                <div>
                    <label class="text-[11px] text-gray-500 mb-1.5 block font-medium uppercase tracking-wide">Email</label>
                    <input id="login-email" type="email" placeholder="you@example.com" class="auth-input">
                </div>
                <div>
                    <label class="text-[11px] text-gray-500 mb-1.5 block font-medium uppercase tracking-wide">Password</label>
                    <input id="login-password" type="password" placeholder="Enter your password" class="auth-input">
                </div>
            </div>

            <!-- 2FA section (hidden until needed) -->
            <div id="twofa-section" class="hidden mt-3 p-4 bg-violet-950/20 border border-violet-800/25 rounded-xl">
                <p class="text-xs text-violet-300 mb-3 flex items-center gap-1.5">
                    <i data-lucide="mail" class="w-3.5"></i>
                    A 6-digit code was sent to your email.
                </p>
                <input id="twofa-code" type="text" placeholder="000000" maxlength="6"
                    class="auth-input tracking-[0.5em] text-center font-mono">
            </div>

            <button id="login-btn" onclick="handleLogin()"
                class="w-full mt-5 py-3 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white font-semibold rounded-full transition-all text-sm shadow-lg shadow-violet-900/25 hover:shadow-violet-900/40">
                Log In
            </button>
        </div>

        <!-- Signup Form -->
        <div id="signup-form" class="hidden">
            <div class="space-y-3">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[11px] text-gray-500 mb-1.5 block font-medium uppercase tracking-wide">First name</label>
                        <input id="signup-firstname" type="text" placeholder="John" class="auth-input">
                    </div>
                    <div>
                        <label class="text-[11px] text-gray-500 mb-1.5 block font-medium uppercase tracking-wide">Last name</label>
                        <input id="signup-lastname" type="text" placeholder="Doe" class="auth-input">
                    </div>
                </div>
                <div>
                    <label class="text-[11px] text-gray-500 mb-1.5 block font-medium uppercase tracking-wide">Email</label>
                    <input id="signup-email" type="email" placeholder="you@example.com" class="auth-input">
                </div>
                <div>
                    <label class="text-[11px] text-gray-500 mb-1.5 block font-medium uppercase tracking-wide">Password</label>
                    <input id="signup-password" type="password" placeholder="Min 6 characters" class="auth-input">
                </div>
                <div>
                    <label class="text-[11px] text-gray-500 mb-1.5 block font-medium uppercase tracking-wide">Confirm password</label>
                    <input id="signup-confirm" type="password" placeholder="Re-enter password" class="auth-input">
                </div>
            </div>
            <button id="signup-btn" onclick="handleSignup()"
                class="w-full mt-5 py-3 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 text-white font-semibold rounded-full transition-all text-sm shadow-lg shadow-violet-900/25 hover:shadow-violet-900/40">
                Create Account
            </button>
        </div>

        <p class="text-center text-[11px] text-gray-700 mt-6">
            By continuing you agree to Clarity AI's terms of service.
        </p>
    </div>

    <script>
        lucide.createIcons();

        // Redirect if already logged in
        if (localStorage.getItem('clarity_token')) window.location.href = '/app.html';

        // Check URL for mode
        if (new URLSearchParams(location.search).get('mode') === 'signup') showSignup();

        let awaiting2FA  = false;
        let pendingEmail = '';

        // ── Location detection for 2FA trust ──────────────────
        let currentLocationKey = null;
        let currentIpAddress   = null;

        // Fetch approximate location via IP geolocation (no permission needed)
        (async function fetchLocation() {
            try {
                const r    = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(4000) });
                const data = await r.json();
                if (data && data.city && data.country_code) {
                    // Use city+country as location key (low precision, good enough for geo-trust)
                    currentLocationKey = (data.city + ',' + data.country_code).toLowerCase().replace(/\s+/g,'_');
                    currentIpAddress   = data.ip || '';
                }
            } catch (_) { /* geolocation unavailable — 2FA will always be required */ }
        })();

        function getTrustedDevice(email) {
            // 2FA is always required on login — no more 12hr trusted device skip
            return null;
        }

        function storeTrustedDevice(email, deviceTrustKey) {
            if (!currentLocationKey || !deviceTrustKey) return;
            try {
                const key = 'clarity_trusted_dev_' + email;
                localStorage.setItem(key, JSON.stringify({
                    deviceTrustKey,
                    locationKey:  currentLocationKey,
                    lastVerified: Date.now()
                }));
            } catch (_) {}
        }

        // ── Tab switching ──────────────────────────────────
        function showLogin() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('signup-form').classList.add('hidden');
            document.getElementById('tab-login').className  = 'flex-1 py-2.5 text-sm font-medium rounded-lg transition-all border tab-active';
            document.getElementById('tab-signup').className = 'flex-1 py-2.5 text-sm font-medium rounded-lg transition-all border tab-inactive';
            clearAlert();
        }
        function showSignup() {
            document.getElementById('signup-form').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
            document.getElementById('tab-signup').className = 'flex-1 py-2.5 text-sm font-medium rounded-lg transition-all border tab-active';
            document.getElementById('tab-login').className  = 'flex-1 py-2.5 text-sm font-medium rounded-lg transition-all border tab-inactive';
            clearAlert();
        }

        // ── Alerts ────────────────────────────────────────
        function showAlert(msg, type = 'error') {
            const el = document.getElementById('alert');
            if (type === 'error') {
                el.className = 'mb-4 p-3 rounded-xl text-sm border bg-red-950/50 border-red-900/40 text-red-400';
            } else {
                el.className = 'mb-4 p-3 rounded-xl text-sm border bg-green-950/50 border-green-900/40 text-green-400';
            }
            el.textContent = msg;
            el.classList.remove('hidden');
        }
        function clearAlert() { document.getElementById('alert').classList.add('hidden'); }

        // ── Button loading state ───────────────────────────
        function setLoading(id, loading, label) {
            const btn = document.getElementById(id);
            btn.disabled = loading;
            btn.textContent = loading ? 'Please wait…' : label;
        }

        // ── Login ─────────────────────────────────────────
        async function handleLogin() {
            clearAlert();

            // Verify 2FA code if we're in that step
            if (awaiting2FA) {
                const code = document.getElementById('twofa-code').value.trim();
                if (code.length !== 6) { showAlert('Enter the 6-digit code.'); return; }
                setLoading('login-btn', true, 'Verify Code');
                try {
                    const res  = await fetch('/api/auth/verify-2fa', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email:       pendingEmail,
                            code,
                            locationKey: currentLocationKey,
                            ipAddress:   currentIpAddress
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) { showAlert(data.error || 'Invalid or expired code.'); return; }
                    // Store device trust key so next login from same location skips 2FA
                    if (data.device_trust_key) {
                        storeTrustedDevice(pendingEmail, data.device_trust_key);
                    }
                    completeLogin(data);
                } catch { showAlert('Connection error. Try again.'); }
                finally   { setLoading('login-btn', false, 'Verify Code'); }
                return;
            }

            const email    = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            if (!email || !password) { showAlert('Fill in all fields.'); return; }

            setLoading('login-btn', true, 'Log In');
            try {
                // Check if this device+location is trusted (skip 2FA)
                const trustedKey = getTrustedDevice(email);

                const body = { email, password };
                if (trustedKey && currentLocationKey) {
                    body.deviceTrustKey = trustedKey;
                    body.locationKey    = currentLocationKey;
                }

                const res  = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body)
                });
                const data = await res.json();
                if (!res.ok) { showAlert(data.error || 'Invalid email or password.'); return; }

                if (data.requires2FA) {
                    awaiting2FA  = true;
                    pendingEmail = email;
                    document.getElementById('twofa-section').classList.remove('hidden');
                    document.getElementById('login-btn').textContent = 'Verify Code';
                    showAlert('Check your email for a 6-digit code.', 'success');
                    lucide.createIcons();
                } else {
                    // If trusted login succeeded, refresh the trust timestamp
                    if (trustedKey && data.trusted) storeTrustedDevice(email, trustedKey);
                    completeLogin(data);
                }
            } catch { showAlert('Connection error. Try again.'); }
            finally   { setLoading('login-btn', false, awaiting2FA ? 'Verify Code' : 'Log In'); }
        }

        function completeLogin(data) {
            localStorage.setItem('clarity_token', data.access_token);
            localStorage.setItem('clarity_user',  JSON.stringify(data.user));
            // If we just verified 2FA, mark the session so app.html doesn't prompt again
            if (awaiting2FA) {
                sessionStorage.setItem('clarity_2fa_ok', '1');
            }
            window.location.href = '/app.html';
        }

        // ── Signup ────────────────────────────────────────
        async function handleSignup() {
            clearAlert();
            const firstName = document.getElementById('signup-firstname').value.trim();
            const lastName  = document.getElementById('signup-lastname').value.trim();
            const email     = document.getElementById('signup-email').value.trim();
            const password  = document.getElementById('signup-password').value;
            const confirm   = document.getElementById('signup-confirm').value;

            if (!firstName || !lastName || !email || !password || !confirm) {
                showAlert('Please fill in all fields.'); return;
            }
            if (password !== confirm) { showAlert('Passwords do not match.'); return; }
            if (password.length < 6)  { showAlert('Password must be at least 6 characters.'); return; }

            setLoading('signup-btn', true, 'Create Account');
            try {
                const res  = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ firstName, lastName, email, password })
                });
                const data = await res.json();
                if (!res.ok) { showAlert(data.error || 'Signup failed. Please try again.'); return; }
                showAlert('Account created! You can now log in.', 'success');
                setTimeout(showLogin, 1800);
            } catch { showAlert('Connection error. Try again.'); }
            finally   { setLoading('signup-btn', false, 'Create Account'); }
        }

        // ── Enter key support ──────────────────────────────
        document.addEventListener('keydown', e => {
            if (e.key !== 'Enter') return;
            if (!document.getElementById('signup-form').classList.contains('hidden')) handleSignup();
            else handleLogin();
        });
    </script>
</body>
</html>
