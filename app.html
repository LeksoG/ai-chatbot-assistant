<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clarity AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root { --bg: #0a0a0a; }
        body { background: var(--bg); color: white; font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; overflow-x: hidden; }

        /* ── Canvas name subtitle ── */
        #canvas-name { font-size:0.62rem; color:#6b7280; line-height:1; margin-top:1px; max-width:150px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

        /* ── Rainbow glow (main page oval input) ── */
        .glow-wrapper { position:absolute; inset:-2px; border-radius:9999px; overflow:hidden; filter:blur(8px); opacity:0; transition:opacity 1s ease, border-radius 0.22s ease; }
        .glow-content  { position:absolute; inset:-150%; border-radius:50%; background:conic-gradient(from 0deg,transparent 0deg,#ff00c8 40deg,#7000ff 100deg,#00c2ff 160deg,#00ff85 220deg,#ffea00 280deg,transparent 360deg); animation:rainbow-trace 2.5s ease-out forwards; }
        @keyframes rainbow-trace { 0%{transform:rotate(0deg) scale(0.8)} 100%{transform:rotate(360deg) scale(1)} }

        /* ── Layout transitions ── */
        .chat-input-wrapper { transition:left 0.42s cubic-bezier(0.4,0,0.2,1), max-width 0.42s ease, width 0.42s ease, bottom 0.5s ease, position 0s; z-index:50; }
        .conversation-started .chat-input-wrapper { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); width:100%; max-width:42rem; }
        body.canvas-open.conversation-started .chat-input-wrapper { left:24% !important; max-width:min(38rem,calc(48vw - 3rem)); }
        .hide-on-start { }
        .conversation-started .hide-on-start { opacity:0; transform:translateY(-20px); pointer-events:none; display:none; }
        @keyframes home-fade-up { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        #main-ui { transition:justify-content 0.5s ease; }
        .conversation-started #main-ui { justify-content:flex-start; padding-top:5.5rem; }
        #chat-results { display:none; opacity:0; }
        .conversation-started #chat-results { display:flex; animation:fade-up 0.5s ease forwards; }
        @keyframes fade-up { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        /* ── Bottom fade mask so messages dissolve before input bar ── */
        .conversation-started #bottom-fade { display:block; }
        #bottom-fade { display:none; position:fixed; bottom:4rem; left:0; right:0; height:10rem; pointer-events:none; z-index:40; background:linear-gradient(to bottom, transparent 0%, var(--bg) 80%); }
        body.canvas-open #bottom-fade { right:52%; }
        /* ── Scroll to bottom button ── */
        #scroll-to-bottom { position:fixed; bottom:6.5rem; left:50%; transform:translateX(-50%) translateY(10px); z-index:45; opacity:0; pointer-events:none; transition:opacity 0.25s ease, transform 0.25s ease; }
        #scroll-to-bottom.stb-visible { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
        body.canvas-open #scroll-to-bottom { left:24%; }

        /* ── Sidebar ── */
        #sidebar { transition:transform 0.5s cubic-bezier(0.4,0,0.2,1); }

        /* ── Markdown ── */
        .ai-response { line-height:1.75; }
        .ai-response h1 { font-size:1.5rem; font-weight:700; margin:1.25rem 0 0.5rem; color:#f1f5f9; }
        .ai-response h2 { font-size:1.2rem; font-weight:700; margin:1rem 0 0.4rem; color:#e2e8f0; border-bottom:1px solid #2d2d3f; padding-bottom:0.3rem; }
        .ai-response h3 { font-size:1.05rem; font-weight:600; margin:0.85rem 0 0.35rem; color:#cbd5e0; }
        .ai-response p { margin:0.55rem 0; }
        .ai-response p:first-child { margin-top:0; }
        .ai-response p:last-child  { margin-bottom:0; }
        .ai-response ul { list-style:none; padding-left:0; margin:0.5rem 0; }
        .ai-response ul li { padding-left:1.4rem; position:relative; margin:0.35rem 0; }
        .ai-response ul li::before { content:"▸"; position:absolute; left:0; color:#7c3aed; font-size:0.8rem; top:0.15rem; }
        .ai-response ol { list-style:decimal; padding-left:1.6rem; margin:0.5rem 0; }
        .ai-response ol li { margin:0.35rem 0; }
        .ai-response code { background:#1e1e2e; border:1px solid #2d2d3f; padding:0.1rem 0.4rem; border-radius:0.3rem; font-family:'Courier New',monospace; font-size:0.85rem; color:#a78bfa; }
        .ai-response pre { background:#12121f; border:1px solid #2d2d3f; border-radius:0.85rem; padding:1.1rem 1.2rem; margin:0.85rem 0; overflow-x:auto; }
        .ai-response pre code { background:none; border:none; padding:0; color:#e2e8f0; font-size:0.875rem; }
        .ai-response blockquote { border-left:3px solid #7c3aed; padding:0.3rem 0 0.3rem 1rem; margin:0.75rem 0; color:#94a3b8; font-style:italic; background:#ffffff05; border-radius:0 0.5rem 0.5rem 0; }
        .ai-response strong { color:#f1f5f9; font-weight:600; }
        .ai-response a { color:#818cf8; text-decoration:underline; }
        .ai-response table { width:100%; border-collapse:collapse; margin:0.75rem 0; }
        .ai-response th { background:#1e1e2e; padding:0.5rem 0.75rem; text-align:left; border:1px solid #2d2d3f; font-weight:600; }
        .ai-response td { padding:0.5rem 0.75rem; border:1px solid #2d2d3f; }
        .ai-response tr:nth-child(even) td { background:#ffffff04; }

        /* ── Cursor + dots ── */
        .typing-cursor { display:inline-block; width:2px; height:1.1em; background:#a78bfa; margin-left:2px; vertical-align:text-bottom; border-radius:1px; animation:blink 0.65s step-end infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
        .loading-dots span { display:inline-block; width:6px; height:6px; background:#7c3aed; border-radius:50%; margin:0 2px; animation:dot-bounce 1.4s infinite ease-in-out; }
        .loading-dots span:nth-child(2){animation-delay:.2s} .loading-dots span:nth-child(3){animation-delay:.4s}
